
services:
  db:
    image: mysql:8.0
    container_name: sosm_db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-db_sosm}
      MYSQL_USER: ${DB_USER:-sosmUser}
      MYSQL_PASSWORD: ${DB_PASS:-sosm_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
    volumes:
      - dbdata:/var/lib/mysql
      # Auto-init: runs .sql files once on a NEW volume (first startup)
      - ./server/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","127.0.0.1","-p${DB_ROOT_PASS:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - sosm_net

  server:
    image: node:20-alpine
    container_name: sosm_server
    working_dir: /app
    env_file: ./.env
    environment:
      # Pass DB connection to the app (fallbacks are for local dev)
      DB_CLIENT: ${DB_CLIENT:-mysql}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-sosm}
      DB_USER: ${DB_USER:-sosmuser}
      DB_PASS: ${DB_PASS:-sosmpass}
      PORT: 3000
      NODE_ENV: development
    volumes:
      - ./:/app
      # Anonymous volume so node_modules inside container isn’t clobbered by bind mount
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3001}:3000"
    networks:
      - sosm_net

  # Optional: web DB UI at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: sosm_adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - sosm_net

volumes:
  dbdata: {}

networks:
  sosm_net:
    name: sosm_net
    driver: bridge
